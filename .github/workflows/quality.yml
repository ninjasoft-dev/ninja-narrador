name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quality tools
        run: python -m pip install pytest pytest-cov ruff
      - name: Install project without model dependencies
        run: python -m pip install -e . --no-deps
      - name: Lint
        run: python -m ruff check ninja_narrator tests interface.py
      - name: Test
        run: python -m pytest
