name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quality tools
        run: python -m pip install pytest pytest-cov ruff detect-secrets
      - name: Install project without model dependencies
        run: python -m pip install -e . --no-deps
      - name: Check secrets
        shell: pwsh
        run: detect-secrets-hook $(git ls-files)
      - name: Lint
        run: python -m ruff check ninja_narrator tests interface.py
      - name: Test
        run: python -m pytest
